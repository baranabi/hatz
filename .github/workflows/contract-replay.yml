name: Contract Replay

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Compile check
        run: zig build

  test-and-replay:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Unit tests
        run: zig build test
      - name: Replay fixtures (check)
        run: zig build replay-check

  coverage:
    needs: build
    continue-on-error: true  # non-blocking — step summary & artifact survive
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install kcov
        run: brew install kcov
      - name: Run coverage
        run: bash tools/coverage.sh
      - name: Generate coverage step summary
        continue-on-error: true
        run: |
          python3 tools/coverage-summary.py
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: ./coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Upload coverage report (artifact, fallback)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/**
          retention-days: 14
