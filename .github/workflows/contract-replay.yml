name: Contract Replay

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Compile check
        run: zig build

  test-and-replay:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Unit tests
        run: zig build test
      - name: Replay fixtures (check)
        run: zig build replay-check

  coverage:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking — threshold enforcement added later
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install kcov build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-dev build-essential cmake pkg-config libssl-dev \
            libcurl4-openssl-dev libelf-dev zlib1g-dev \
            libdw-dev libiberty-dev
          sudo ldconfig
      - name: Build kcov from source
        run: |
          git clone --depth 1 \
            https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          cd /tmp/kcov-src
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr ..
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig
      - name: kcov ptrace check
        run: |
          echo "=== ptrace_scope ==="
          cat /proc/sys/kernel/yama/ptrace_scope 2>/dev/null || echo "(not available)"
          echo "=== Direct kcov test ==="
          TD=$(mktemp -d)
          kcov --clean "$TD" /bin/true 2>&1; echo "exit=$?"
          ls -la "$TD" 2>&1 || echo "(no output)"
          rm -rf "$TD"
      - name: Verify kcov
        run: |
          which kcov
          kcov --version
          file "$(which kcov)"
          ldd "$(which kcov)" 2>&1 | head -20 || true
      - name: Run coverage
        run: |
          bash tools/coverage.sh 2>&1 | tee /tmp/coverage-output.txt
          echo "EXIT_CODE=$?"
      - name: Check coverage report
        run: |
          echo "=== coverage/ directory ==="
          ls -la coverage/ 2>&1 || echo "(no coverage directory)"
          echo "=== coverage/ files ==="
          find coverage/ -type f 2>/dev/null | head -20 || echo "(empty)"
          echo "=== Debug artifact ==="
          cat /tmp/coverage-output.txt 2>/dev/null || echo "(no debug file)"
      - name: Upload coverage debug log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-debug
          path: /tmp/coverage-output.txt
          retention-days: 3
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
