name: Contract Replay

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Compile check
        run: zig build

  test-and-replay:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Unit tests
        run: zig build test
      - name: Replay fixtures (check)
        run: zig build replay-check

  coverage:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking — step summary & artifact survive
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install kcov build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-dev build-essential cmake pkg-config libssl-dev \
            libcurl4-openssl-dev libelf-dev zlib1g-dev \
            libdw-dev libiberty-dev
      - name: Build kcov from source
        run: |
          git clone --depth 1 \
            https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          cd /tmp/kcov-src
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr ..
          make -j"$(nproc)"
          sudo make install
      - name: Verify kcov
        run: |
          which kcov
          kcov --version
      - name: Run coverage
        run: bash tools/coverage.sh
      - name: Generate coverage step summary
        continue-on-error: true
        run: |
          python3 tools/coverage-summary.py
      - name: Generate Cobertura XML for Codecov
        run: |
          echo "### Cobertura XML generation" >> "$GITHUB_STEP_SUMMARY"
          # Use kcov's --report-only --cobertura-only to regenerate Cobertura XML
          # from the stored coverage data in each binary's subdirectory.
          # kcov --report-only reads summary.db from subdirectories and regenerates
          # the report. With --cobertura-only it outputs cov.xml (not cobertura.xml).
          for subdir in coverage/*/; do
            if [ -f "${subdir}summary.db" ]; then
              echo "Regenerating from ${subdir}..." >> "$GITHUB_STEP_SUMMARY"
              kcov --report-only --cobertura-only "$subdir" 2>&1 || true
            fi
          done
          # Copy any generated cov.xml to the expected location
          for covfile in coverage/*/cov.xml; do
            if [ -f "$covfile" ]; then
              cp "$covfile" coverage/cobertura.xml
              echo "Copied $covfile to coverage/cobertura.xml" >> "$GITHUB_STEP_SUMMARY"
              break
            fi
          done
          if [ ! -f coverage/cobertura.xml ]; then
            echo "No cov.xml found — trying kcov on root directory" >> "$GITHUB_STEP_SUMMARY"
            kcov --report-only --cobertura-only coverage/ 2>&1 || true
            if [ -f coverage/cov.xml ]; then
              cp coverage/cov.xml coverage/cobertura.xml
            fi
          fi
          # Final check
          if [ -f coverage/cobertura.xml ]; then
            echo "coverage/cobertura.xml: $(wc -c < coverage/cobertura.xml) bytes" >> "$GITHUB_STEP_SUMMARY"
            head -5 coverage/cobertura.xml >> "$GITHUB_STEP_SUMMARY"
          else
            echo "WARNING: no Cobertura XML generated — adding placeholder" >> "$GITHUB_STEP_SUMMARY"
            echo '<?xml version="1.0" ?><coverage></coverage>' > coverage/cobertura.xml
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Upload coverage report (artifact, fallback)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/**
          retention-days: 14
