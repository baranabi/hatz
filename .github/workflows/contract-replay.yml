name: Contract Replay

on:
  pull_request:
  push:

jobs:
  replay-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: ziglang/setup-zig@v1
        with:
          version: 0.15.2
      - name: Replay fixtures (check)
        run: zig build replay-check
