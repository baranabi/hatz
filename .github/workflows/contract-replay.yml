name: Contract Replay

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Compile check
        run: zig build

  test-and-replay:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Unit tests
        run: zig build test
      - name: Replay fixtures (check)
        run: zig build replay-check

  coverage:
    needs: build
    continue-on-error: true  # non-blocking — step summary & artifact survive
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install zig-kcov (build from source)
        timeout-minutes: 10
        run: |
          # roc-lang/zig-kcov fork — handles Zig DWARF properly.
          # Prebuilt binaries crash with SIGILL on GH runners (CPU features),
          # so build from source using the same zig.
          git clone --depth 1 --branch kcov-zig https://github.com/roc-lang/zig-kcov.git /tmp/zig-kcov
          cd /tmp/zig-kcov
          # System deps required by kcov
          sudo apt-get update
          sudo apt-get install -y libdwarf-dev libcurl4-openssl-dev zlib1g-dev pkg-config libelf-dev
          # Ubuntu's libdwarf-dev has no pkg-config file
          sudo tee /usr/lib/x86_64-linux-gnu/pkgconfig/libdwarf.pc <<'EOF'
          prefix=/usr
          exec_prefix=${prefix}
          libdir=${prefix}/lib/x86_64-linux-gnu
          includedir=${prefix}/include
          Name: libdwarf
          Description: DWARF debugging information library
          Version: 0.4.2
          Libs: -L${libdir} -ldwarf
          Cflags: -I${includedir}
          Requires: libelf
          EOF
          # Build with the runner's zig (CPU-safe)
          zig build -Doptimize=ReleaseFast
          sudo install -m 755 zig-out/bin/kcov /usr/local/bin/kcov
          kcov --version
      - name: Run coverage
        timeout-minutes: 10
        run: bash tools/coverage.sh
      - name: Generate coverage step summary
        continue-on-error: true
        run: |
          python3 tools/coverage-summary.py
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: ./coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Upload coverage report (artifact, fallback)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/**
          retention-days: 14
