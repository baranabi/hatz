name: Contract Replay

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Compile check
        run: zig build

  test-and-replay:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Unit tests
        run: zig build test
      - name: Replay fixtures (check)
        run: zig build replay-check

  coverage:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking — step summary & artifact survive
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install kcov build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-dev build-essential cmake pkg-config libssl-dev \
            libcurl4-openssl-dev libelf-dev zlib1g-dev \
            libdw-dev libiberty-dev
      - name: Build kcov from source
        run: |
          git clone --depth 1 \
            https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          cd /tmp/kcov-src
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr ..
          make -j"$(nproc)"
          sudo make install
      - name: Verify kcov
        run: |
          which kcov
          kcov --version
      - name: Run coverage
        run: bash tools/coverage.sh
      - name: Generate coverage step summary
        continue-on-error: true
        run: |
          python3 tools/coverage-summary.py
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: ./coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Upload coverage report (artifact, fallback)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/**
          retention-days: 14
