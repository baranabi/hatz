name: Contract Replay

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Compile check
        run: zig build

  test-and-replay:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Unit tests
        run: zig build test
      - name: Replay fixtures (check)
        run: zig build replay-check

  coverage:
    needs: build
    continue-on-error: true  # non-blocking — step summary & artifact survive
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install zig-kcov
        run: |
          # Use roc-lang/zig-kcov fork — handles Zig DWARF properly
          # (standard kcov breaks on Linux due to DWARF/ELF issues with Zig output)
          KCOV_VERSION="v42.0.1"
          curl -sL "https://github.com/roc-lang/zig-kcov/releases/download/${KCOV_VERSION}/kcov-x86_64-linux.tar.gz" \
            | tar xz -C /tmp
          # Binary is at /tmp/kcov-x86_64-linux/bin/kcov (or similar) — find it
          KCOV_BIN=$(find /tmp -name kcov -type f -perm -111 | head -1)
          if [ -z "$KCOV_BIN" ]; then
            echo "ERROR: kcov binary not found after extraction" >&2
            find /tmp -maxdepth 3 -type f | head -20
            exit 1
          fi
          chmod +x "$KCOV_BIN"
          echo "KCOV=$KCOV_BIN" >> "$GITHUB_ENV"
          echo "Installed zig-kcov at $KCOV_BIN"
          "$KCOV_BIN" --version 2>&1 || true
      - name: Run coverage
        timeout-minutes: 5
        run: bash tools/coverage.sh
      - name: Generate coverage step summary
        continue-on-error: true
        run: |
          python3 tools/coverage-summary.py
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: ./coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Upload coverage report (artifact, fallback)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/**
          retention-days: 14
