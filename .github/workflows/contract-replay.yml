name: Contract Replay

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Compile check
        run: zig build

  test-and-replay:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Unit tests
        run: zig build test
      - name: Replay fixtures (check)
        run: zig build replay-check

  coverage:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking — step summary & artifact survive
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install kcov build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-dev build-essential cmake pkg-config libssl-dev \
            libcurl4-openssl-dev libelf-dev zlib1g-dev \
            libdw-dev libiberty-dev
      - name: Build kcov from source
        run: |
          git clone --depth 1 \
            https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          cd /tmp/kcov-src
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr ..
          make -j"$(nproc)"
          sudo make install
      - name: Verify kcov
        run: |
          which kcov
          kcov --version
      - name: Run coverage
        run: bash tools/coverage.sh
      - name: Generate coverage step summary
        continue-on-error: true
        run: |
          python3 tools/coverage-summary.py
      - name: Verify Cobertura XML exists
        run: |
          echo "### Coverage output files" >> "$GITHUB_STEP_SUMMARY"
          
          # Check if kcov's native cobertura.xml exists at output root
          if [ -f coverage/cobertura.xml ]; then
            echo "coverage/cobertura.xml exists ($(wc -c < coverage/cobertura.xml) bytes)"
            ls -la coverage/cobertura.xml >> "$GITHUB_STEP_SUMMARY"
          elif [ -f coverage/cov.xml ]; then
            echo "coverage/cov.xml exists ($(wc -c < coverage/cov.xml) bytes) — using for Codecov"
            cp coverage/cov.xml coverage/cobertura.xml
            ls -la coverage/cobertura.xml coverage/cov.xml >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Native Cobertura XML not found — regenerating with kcov --report-only --cobertura-only"
            # --report-only regenerates output from stored coverage data without re-tracing
            # --cobertura-only outputs cov.xml (not cobertura.xml due to kcov cobertura-writer logic)
            kcov --report-only --cobertura-only coverage/ 2>&1 || true
            if [ -f coverage/cov.xml ]; then
              cp coverage/cov.xml coverage/cobertura.xml
              echo "Regenerated coverage/cobertura.xml via --report-only ($(wc -c < coverage/cobertura.xml) bytes)"
            else
              echo "ERROR: still no Cobertura XML after --report-only. Files in coverage/:"
              find coverage/ -type f | sort
              exit 1
            fi
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Upload coverage report (artifact, fallback)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/**
          retention-days: 14
